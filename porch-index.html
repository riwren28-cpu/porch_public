<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The porch</title>
<style>
:root {
  --bg: #faf9f5;
  --bg-2: #f1efe8;
  --fg: #2c2c2a;
  --fg-2: #5f5e5a;
  --fg-3: #888780;
  --rule: rgba(0,0,0,0.08);
  --accent: #534ab7;
  --serif: ui-serif, Georgia, "Times New Roman", serif;
  --sans: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg-2: #28282582;
    --fg: #e8e7e0;
    --fg-2: #b4b2a9;
    --fg-3: #888780;
    --rule: rgba(255,255,255,0.10);
    --accent: #a59ff5;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }

/* Gate */
.gate {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
}
.gate-mark {
  width: 80px;
  height: 80px;
  margin-bottom: 1.5rem;
}
.gate h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 1.5rem;
  margin: 0 0 0.5rem;
  letter-spacing: -0.01em;
}
.gate p {
  color: var(--fg-2);
  font-size: 0.95rem;
  margin: 0 0 1.5rem;
  max-width: 28rem;
  line-height: 1.6;
}
.gate form {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  max-width: 22rem;
}
.gate input[type="password"] {
  flex: 1;
  padding: 0.6rem 0.8rem;
  font-family: var(--sans);
  font-size: 0.95rem;
  background: var(--bg-2);
  color: var(--fg);
  border: 1px solid var(--rule);
  border-radius: 6px;
  outline: none;
}
.gate input[type="password"]:focus {
  border-color: var(--accent);
}
.gate button {
  padding: 0.6rem 1.2rem;
  font-family: var(--sans);
  font-size: 0.95rem;
  background: var(--fg);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.gate button:hover { opacity: 0.9; }
.gate .error {
  color: #c14747;
  font-size: 0.85rem;
  margin-top: 0.75rem;
  min-height: 1.2em;
}
.gate .footer {
  position: fixed;
  bottom: 1.5rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.75rem;
  color: var(--fg-3);
}

/* Article */
.article-wrap {
  display: none;
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 1.5rem 6rem;
  line-height: 1.7;
}
article header {
  margin-bottom: 2.5rem;
}
.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.72rem;
  color: var(--fg-3);
  margin: 0 0 0.5rem;
}
article h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 2rem;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin: 0 0 0.75rem;
}
.byline {
  color: var(--fg-2);
  font-size: 0.9rem;
  margin: 0;
}
article h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 1.35rem;
  letter-spacing: -0.005em;
  margin: 2.5rem 0 0.75rem;
}
article p {
  margin: 0 0 1.1rem;
  font-size: 1rem;
  color: var(--fg);
}
article section {
  margin-bottom: 1.5rem;
}
article footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--rule);
  font-size: 0.85rem;
  color: var(--fg-2);
}
article footer p { font-size: 0.85rem; margin-bottom: 0.6rem; }

figure {
  margin: 2rem -0.5rem;
  padding: 1.25rem;
  background: var(--bg-2);
  border-radius: 12px;
}

/* SVG class definitions for the diagram */
svg text.t { font-family: var(--sans); font-size: 14px; font-weight: 400; fill: var(--fg); }
svg text.ts { font-family: var(--sans); font-size: 12px; font-weight: 400; fill: var(--fg-2); }
svg text.th { font-family: var(--sans); font-size: 14px; font-weight: 500; fill: var(--fg); }
svg line.rule { stroke: var(--rule); stroke-width: 0.5; }

/* Color ramps - simplified two-mode versions */
svg .c-coral rect, svg .c-coral circle, svg .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
svg .c-coral text.th { fill: #4A1B0C; }
svg .c-coral text.ts { fill: #712B13; }

svg .c-amber rect, svg .c-amber circle, svg .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
svg .c-amber text.th { fill: #412402; }
svg .c-amber text.ts { fill: #633806; }

svg .c-teal rect, svg .c-teal circle, svg .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
svg .c-teal text.th { fill: #04342C; }
svg .c-teal text.ts { fill: #085041; }

svg .c-gray rect, svg .c-gray circle, svg .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
svg .c-gray text.th { fill: #2C2C2A; }
svg .c-gray text.ts { fill: #444441; }

@media (prefers-color-scheme: dark) {
  svg .c-coral rect, svg .c-coral circle, svg .c-coral ellipse { fill: #712B13; stroke: #F5C4B3; }
  svg .c-coral text.th { fill: #FAECE7; }
  svg .c-coral text.ts { fill: #F5C4B3; }
  svg .c-amber rect, svg .c-amber circle, svg .c-amber ellipse { fill: #633806; stroke: #FAC775; }
  svg .c-amber text.th { fill: #FAEEDA; }
  svg .c-amber text.ts { fill: #FAC775; }
  svg .c-teal rect, svg .c-teal circle, svg .c-teal ellipse { fill: #085041; stroke: #9FE1CB; }
  svg .c-teal text.th { fill: #E1F5EE; }
  svg .c-teal text.ts { fill: #9FE1CB; }
  svg .c-gray rect, svg .c-gray circle, svg .c-gray ellipse { fill: #444441; stroke: #D3D1C7; }
  svg .c-gray text.th { fill: #F1EFE8; }
  svg .c-gray text.ts { fill: #D3D1C7; }
}
</style>
</head>

  </form>

  <div class="footer">the porch · april 2026</div>
</div>

function b64ToBytes(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function unlock(ev) {
  ev.preventDefault();
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!pw) return false;

  try {
    const salt = b64ToBytes(SALT_B64);
    const nonce = b64ToBytes(NONCE_B64);
    const ct = b64ToBytes(CIPHERTEXT_B64);
    const key = await deriveKey(pw, salt);
    const ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
    const html = new TextDecoder().decode(ptBuf);
    document.getElementById('gate').style.display = 'none';
    const wrap = document.getElementById('content');
    wrap.innerHTML = html;
    wrap.style.display = 'block';
    document.title = 'Three patterns of behavioral alignment';
  } catch (e) {
    errEl.textContent = 'wrong password';
    document.getElementById('pw').select();
  }
  return false;
}
